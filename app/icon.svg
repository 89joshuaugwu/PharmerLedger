<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="100%" height="100%">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D7377" />
      <stop offset="100%" stop-color="#0A5A5D" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
  </defs>

  <!-- Ledger Stack Background (Isometric Pages) -->
  <g transform="translate(15, 20)">
    <!-- Bottom Ledger Layer -->
    <path d="M35 55 L70 40 L70 50 L35 65 L0 50 L0 40 Z" fill="#0A5A5D" />
    
    <!-- Middle Ledger Layer -->
    <path d="M35 40 L70 25 L70 35 L35 50 L0 35 L0 25 Z" fill="#0D7377" />
    
    <!-- Top Ledger Layer (Base of the cross) -->
    <path d="M35 10 L70 25 L35 40 L0 25 Z" fill="url(#tealGrad)" />
  </g>

  <!-- Clinical Medical Cross -->
  <!-- Designed to look like it's intersecting the ledger data -->
  <g transform="translate(30, 15)">
    <!-- Vertical Pill -->
    <rect x="14" y="0" width="12" height="40" fill="url(#blueGrad)" rx="3" shadow="sm" />
    <!-- Horizontal Pill -->
    <rect x="0" y="14" width="40" height="12" fill="url(#blueGrad)" rx="3" />
    
    <!-- Inner Cross Highlight for Depth -->
    <rect x="16" y="2" width="8" height="36" fill="#FFFFFF" opacity="0.2" rx="2" />
    <rect x="2" y="16" width="36" height="8" fill="#FFFFFF" opacity="0.2" rx="2" />
  </g>
</svg>
